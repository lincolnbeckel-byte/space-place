<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ SPACE OUT 99 ⚡</title>
    <style>
        /* 90s Starry Nebula Aesthetic */
        body {
            background-color: #060112;
            background-image: radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 20px),
                              radial-gradient(#ff00ff, rgba(255,0,255,.1) 2px, transparent 60px);
            background-size: 300px 300px, 400px 400px;
            color: #33ff00;
            font-family: "Courier New", Courier, monospace;
            text-align: center;
            padding: 15px;
            margin: 0;
            overflow-x: hidden;
        }

        /* Laser Canvas Foreground layer */
        #laserCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
        }

        /* Pure 90s Flashing Animation */
        .neon-flash {
            animation: blink 0.7s steps(2, start) infinite;
            color: #ffff00;
            font-size: 2.8rem;
            text-shadow: 3px 3px #ff00ff;
            margin: 15px 0;
            font-weight: 900;
        }

        @keyframes blink {
            to { visibility: hidden; }
        }

        .main-pod {
            max-width: 750px;
            margin: 20px auto;
            border: 5px ridge #00ffff;
            background: rgba(5, 2, 15, 0.95);
            padding: 25px;
            box-shadow: 0 0 20px #ff00ff;
            position: relative;
        }

        .deck-zone {
            border: 3px dashed #ff00ff;
            padding: 20px;
            margin: 25px 0;
            background: rgba(0, 255, 255, 0.05);
        }

        input[type="file"], input[type="text"] {
            background: #000;
            color: #33ff00;
            border: 2px solid #00ffff;
            padding: 10px;
            margin: 10px 0;
            font-family: inherit;
            width: 80%;
            max-width: 400px;
        }

        .launch-btn {
            background: #00ffff;
            color: #000;
            border: 3px outset #ffffff;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 4px 4px 0px #ff00ff;
        }

        .launch-btn:active {
            border-style: inset;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #ff00ff;
        }

        /* Photo Grid Layout */
        .grid-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .matrix-card {
            border: 3px solid #ff00ff;
            background: #000;
            padding: 12px;
            box-shadow: 3px 3px 0px #00ffff;
        }

        .matrix-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border: 1px solid #33ff00;
        }

        .matrix-caption {
            font-size: 0.95rem;
            color: #00ffff;
            margin-top: 10px;
            word-break: break-all;
        }

        .alert-hud {
            color: #ff0033;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 15px;
            display: none;
            text-shadow: 1px 1px #000;
        }
    </style>
</head>
<body>

    <canvas id="laserCanvas"></canvas>

    <div class="main-pod">
        <div>📡 NETWORK CONNECTION LINK ESTABLISHED 📡</div>
        <div class="neon-flash">=== SPACE STATION 99 ===</div>
        <p>Welcome to the submission hub. All uploads are reviewed for community guidelines.</p>
        
        <hr style="border-color: #33ff00; border-style: dotted;">

        <div class="deck-zone">
            <h3>🛸 UPLOAD FILES 🛸</h3>
            <input type="file" id="spaceFile" accept="image/*"><br>
            <input type="text" id="spaceCaption" placeholder="Enter file caption..." autocomplete="off"><br>
            <button class="launch-btn" onclick="fireUpload()">SUBMIT TRANSMISSION</button>
            <div id="hudAlert" class="alert-hud">🚨 ERROR: CONTENT EXCEEDS SECURITY COMPLIANCE STANDARDS 🚨</div>
        </div>

        <h2>🌟 COMMUNITY GALLERY 🌟</h2>
        <div class="grid-matrix" id="galleryContainer"></div>
    </div>

    <script>
        const restrictionList = ["badword1", "badword2", "hate", "stupid", "jerk"];

        window.onload = function() {
            renderGallery();
            setupLasers();
        };

        // --- LASER SYSTEM JAVASCRIPT ---
        function setupLasers() {
            const canvas = document.getElementById('laserCanvas');
            const ctx = canvas.getContext('2d');
            
            let pointer = { x: -1000, y: -1000, active: false };
            let sparks = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            window.addEventListener('mousemove', (e) => {
                pointer.x = e.clientX;
                pointer.y = e.clientY;
                pointer.active = true;
                generateSparks(e.clientX, e.clientY);
            });

            window.addEventListener('touchmove', (e) => {
                if(e.touches.length > 0) {
                    pointer.x = e.touches[0].clientX;
                    pointer.y = e.touches[0].clientY;
                    pointer.active = true;
                    generateSparks(pointer.x, pointer.y);
                }
            }, { passive: true });

            window.addEventListener('mouseleave', () => { pointer.active = false; });
            window.addEventListener('touchend', () => { pointer.active = false; });

            function generateSparks(x, y) {
                for (let i = 0; i < 2; i++) {
                    sparks.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        alpha: 1.0,
                        color: Math.random() > 0.5 ? '#00ffff' : '#ff00ff'
                    });
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (pointer.active) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#00ffff';
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.8)';
                    ctx.lineWidth = 3;

                    ctx.beginPath();
                    ctx.moveTo(0, pointer.y);
                    ctx.lineTo(canvas.width, pointer.y);
                    ctx.stroke();

                    ctx.strokeStyle = 'rgba(255, 0, 255, 0.8)';
                    ctx.shadowColor = '#ff00ff';
                    ctx.beginPath();
                    ctx.moveTo(pointer.x, 0);
                    ctx.lineTo(pointer.x, canvas.height);
                    ctx.stroke();
                }

                for (let i = sparks.length - 1; i >= 0; i--) {
                    let s = sparks[i];
                    s.x += s.vx;
                    s.y += s.vy;
                    s.alpha -= 0.04;

                    if (s.alpha <= 0) {
                        sparks.splice(i, 1);
                        continue;
                    }

                    ctx.shadowBlur = 10;
                    ctx.shadowColor = s.color;
                    ctx.fillStyle = s.color;
                    ctx.globalAlpha = s.alpha;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, Math.random() * 4 + 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.globalAlpha = 1.0;
                ctx.shadowBlur = 0;
                requestAnimationFrame(animate);
            }
            animate();
        }

        // --- UPLOAD SYSTEM JAVASCRIPT ---
        function fireUpload() {
            const fileSelector = document.getElementById('spaceFile');
            const captionSelector = document.getElementById('spaceCaption');
            const hudAlert = document.getElementById('hudAlert');

            hudAlert.style.display = 'none';

            if (!fileSelector.files || !fileSelector.files[0]) {
                alert("Please select a file to upload.");
                return;
            }

            const cleanCheck = captionSelector.value.toLowerCase();
            const badMatch = restrictionList.some(bannedWord => cleanCheck.includes(bannedWord));

            if (badMatch) {
                hudAlert.style.display = 'block';
                captionSelector.value = '';
                return;
            }

            const activeFile = fileSelector.files[0];
            const dataConverter = new FileReader();

            dataConverter.onload = function(event) {
                const finalImgData = event.target.result;
                const finalCaption = captionSelector.value || "Archive Entry";

                let database = JSON.parse(localStorage.getItem('cosmicArchive')) || [];
                database.unshift({ rawImage: finalImgData, label: finalCaption });
                localStorage.setItem('cosmicArchive', JSON.stringify(database));

                renderGallery();

                fileSelector.value = '';
                captionSelector.value = '';
            };

            dataConverter.readAsDataURL(activeFile);
        }

        function renderGallery() {
            const displayMatrix = document.getElementById('galleryContainer');
            displayMatrix.innerHTML = '';

            let database = JSON.parse(localStorage.getItem('cosmicArchive')) || [];

            if (database.length === 0) {
                database.push({
                    rawImage: "https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?w=400",
                    label: "Database online. Awaiting system logs..."
                });
            }

            database.forEach(node => {
                const structuralCard = document.createElement('div');
                structuralCard.className = 'matrix-card';

                const mediaTag = document.createElement('img');
                mediaTag.src = node.rawImage;

                const textTag = document.createElement('div');
                textTag.className = 'matrix-caption';
                textTag.textContent = node.label;

                structuralCard.appendChild(mediaTag);
                structuralCard.appendChild(textTag);
                displayMatrix.appendChild(structuralCard);
            });
        }
    </script>
</body>
</html>
